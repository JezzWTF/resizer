<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep, modern Windows 11 Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C2FF" />
      <stop offset="100%" style="stop-color:#00459E" />
    </linearGradient>

    <!-- Frosted Glass Effect -->
    <linearGradient id="glassFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.1" />
    </linearGradient>

    <!-- Mountain Scene Gradients -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9D00" />
      <stop offset="100%" style="stop-color:#FF4D00" />
    </linearGradient>
    
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" />
    </filter>

    <filter id="dropShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 1. Background Shell (rx=28) -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bgGrad)" filter="url(#dropShadow)" />

  <!-- 2. The "Original Size" Ghost State -->
  <!-- Fixed rx to 16 to be perfectly concentric with the background (28 - 12 margin) -->
  <rect x="20" y="20" width="88" height="88" rx="16" fill="none" stroke="white" stroke-width="2" stroke-dasharray="8 4" opacity="0.2" />

  <!-- 3. The "Resizing" Image Card -->
  <g transform="translate(20, 20)" filter="url(#dropShadow)">
    <!-- Glass Pane -->
    <rect x="0" y="0" width="64" height="64" rx="10" fill="url(#glassFill)" stroke="white" stroke-opacity="0.4" stroke-width="1.5" />
    
    <!-- Image Content: Sunset Mountains -->
    <clipPath id="cardClip">
      <rect x="0" y="0" width="64" height="64" rx="10" />
    </clipPath>
    <g clip-path="url(#cardClip)">
      <rect width="64" height="64" fill="url(#skyGrad)" opacity="0.4" />
      <circle cx="48" cy="16" r="6" fill="#FFD600" />
      <path d="M10 64 L32 28 L54 64 Z" fill="#002050" opacity="0.3" />
      <path d="M-10 64 L20 34 L50 64 Z" fill="#002050" opacity="0.5" />
    </g>
  </g>

  <!-- 4. Professional UI Resize Handles -->
  <g stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Top Left (Anchor) - Pinned to 20,20 -->
    <path d="M28 20 H20 V28" opacity="0.8" />
    
    <!-- Bottom Right (The Active Handle) -->
    <g filter="url(#dropShadow)">
      <!-- Corner Bracket on the Glass (Aligned to 84,84) -->
      <path d="M76 84 H84 V76" />
      <!-- Scaling Indicator Arrow -->
      <path d="M92 92 L104 104 M104 94 V104 H94" stroke-width="4" />
      <!-- Connection Line -->
      <line x1="84" y1="84" x2="94" y2="94" stroke-width="2" stroke-dasharray="2 2" opacity="0.6" />
    </g>
  </g>

  <!-- 5. Active Handle Node (Centered exactly at 84,84) -->
  <circle cx="84" cy="84" r="5" fill="white" filter="url(#dropShadow)" />
  <circle cx="84" cy="84" r="2.5" fill="#0078D4" />

  <!-- 6. Fixed Shine: Now uses an Arc (A) to perfectly match the background squircle radius -->
  <path d="M40 8 H92 A 28 28 0 0 1 120 36" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.15" />
</svg>