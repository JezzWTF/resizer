<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background: rich blue to indigo -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#5E35B1"/>
    </linearGradient>

    <!-- Photo sky: warm sunset -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#29B6F6"/>
      <stop offset="55%"  stop-color="#FFA726"/>
      <stop offset="100%" stop-color="#EF5350"/>
    </linearGradient>

    <clipPath id="photoClip">
      <rect width="80" height="80" rx="12"/>
    </clipPath>

    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background shell -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Top-edge gloss -->
  <path d="M28 0 H100 A26 26 0 0 1 128 28 V0 Z" fill="white" opacity="0.09"/>

  <!-- Ghost card (batch indicator — peeks from behind main card) -->
  <rect x="20" y="20" width="80" height="80" rx="12" fill="white" opacity="0.22"/>

  <!-- ── Main photo card ───────────────────────────────────── -->
  <g transform="translate(8, 8)" filter="url(#cardShadow)">
    <rect width="80" height="80" rx="12" fill="white"/>
    <g clip-path="url(#photoClip)">
      <!-- Sky gradient -->
      <rect width="80" height="80" fill="url(#sky)"/>
      <!-- Back mountain -->
      <path d="M0 80 L24 34 L48 80Z" fill="#455A64" opacity="0.55"/>
      <!-- Front mountain -->
      <path d="M28 80 L56 18 L84 80Z" fill="#1A237E" opacity="0.78"/>
      <!-- Snow cap -->
      <path d="M56 18 L49 34 L63 34Z" fill="white"/>
      <!-- Sun -->
      <circle cx="16" cy="16" r="9" fill="#FFD600"/>
      <!-- Sun halo -->
      <circle cx="16" cy="16" r="14" fill="#FF8F00" opacity="0.22"/>
    </g>
    <!-- Card inner border gloss -->
    <rect width="80" height="80" rx="12" fill="none"
          stroke="white" stroke-opacity="0.18" stroke-width="1.5"/>
  </g>

  <!-- ── Resize handle (bottom-right, anchored to card corner at 88,88) ── -->

  <!-- Corner L-bracket on the card edge -->
  <path d="M77 88 L88 88 L88 77"
        fill="none" stroke="white" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dashed connector from handle to arrow -->
  <line x1="95" y1="95" x2="101" y2="101"
        stroke="white" stroke-width="2"
        stroke-dasharray="3 3" opacity="0.45"/>

  <!-- Bold diagonal expand arrow -->
  <path d="M103 103 L119 119"
        fill="none" stroke="white" stroke-width="5.5"
        stroke-linecap="round"/>

  <!-- Arrowhead -->
  <path d="M109 119 L119 119 L119 109"
        fill="none" stroke="white" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Handle knob at card corner -->
  <circle cx="88" cy="88" r="7" fill="white" filter="url(#cardShadow)"/>
  <circle cx="88" cy="88" r="3.5" fill="#1E88E5"/>
</svg>
